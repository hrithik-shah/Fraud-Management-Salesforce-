<template>
    <lightning-card title="Customer Card Management" icon-name="standard:service_contract">
        
        <div class="slds-m-around_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-end">
            <div class="slds-col slds-size_1-of-3">
                <lightning-combobox 
                    name="filter" 
                    label="Filter Cards" 
                    value={filterValue} 
                    options={filterOptions} 
                    onchange={handleFilterChange}>
                </lightning-combobox>
            </div>
            <div class="slds-col">
                <lightning-button 
                    label="Report Stolen Card" 
                    variant="destructive" 
                    onclick={openReportStolenFlow} 
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button-icon 
                    icon-name="utility:refresh" 
                    variant="border-filled" 
                    alternative-text="Refresh List" 
                    onclick={handleRefresh}>
                </lightning-button-icon>
            </div>
        </div>

        <div class="slds-m-around_medium" style="height: 400px;">
            <template if:true={cards}>
                <lightning-datatable
                    key-field="Id"
                    data={cards}
                    columns={columns}
                    onrowaction={handleRowAction}
                    hide-checkbox-column="true">
                </lightning-datatable>
            </template>
        </div>

        <template if:true={isFlowOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">{flowModalTitle}</h2>
                    </header>
                    
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-flow 
                            flow-api-name={activeFlowApiName} 
                            flow-input-variables={flowVariables} 
                            onstatuschange={handleFlowStatusChange}>
                        </lightning-flow>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
