<template>
    <div class="dribbble-card slds-is-relative">
        
        <div class="slds-grid slds-grid_align-spread slds-p-around_medium header-section">
            <h2 class="slds-text-heading_medium slds-text-color_default slds-var-p-top_xx-small"><strong>Transactions</strong></h2>
            
            <div class="action-buttons">
                <lightning-button label="Approve" variant="success" icon-name="utility:check" class="slds-m-right_x-small" onclick={handleBulkApprove} disabled={isBulkDisabled}></lightning-button>
                <lightning-button label="Cancel" icon-name="utility:close" class="slds-m-right_x-small" onclick={handleBulkCancel} disabled={isBulkDisabled}></lightning-button>
                <lightning-button label="Mark Fraud" variant="destructive" icon-name="utility:warning" onclick={handleBulkFraud} disabled={isBulkDisabled}></lightning-button>
            </div>
        </div>

        <div class="filter-panel slds-p-horizontal_medium slds-p-bottom_medium">
            <div class="slds-grid slds-wrap slds-gutters">
                <lightning-input name="Transaction_ID__c" label="Transaction IDs (Comma separated for OR)" class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-input>
                <lightning-input name="Product_Code__c" label="Product Codes" class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-input>
                <lightning-input name="Store_Location__c" label="Store Locations" class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-input>
                <lightning-input name="Masked_Card_Number__c" label="Masked Cards" class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-input>
                <lightning-input name="Customer_ID__c" label="Customer IDs" class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-input>
                
                <lightning-combobox name="Status__c" label="Status" value={filters.Status__c} options={statusOptions} class="slds-col slds-size_1-of-4" onchange={handleFilterChange}></lightning-combobox>

                <div class="slds-col slds-size_1-of-4 slds-grid slds-gutters">
                    <lightning-input type="number" name="minAmount" label="Min $" class="slds-col slds-size_1-of-2" onchange={handleFilterChange}></lightning-input>
                    <lightning-input type="number" name="maxAmount" label="Max $" class="slds-col slds-size_1-of-2" onchange={handleFilterChange}></lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-4 slds-grid slds-gutters">
                    <lightning-input type="date" name="minDate" label="From" class="slds-col slds-size_1-of-2" onchange={handleFilterChange}></lightning-input>
                    <lightning-input type="date" name="maxDate" label="To" class="slds-col slds-size_1-of-2" onchange={handleFilterChange}></lightning-input>
                </div>
            </div>
            
            <div class="slds-m-top_small slds-p-top_small slds-border_top slds-grid slds-grid_vertical-align-end">
                <span class="slds-text-color_weak slds-m-right_small">Multi-Column Sort:</span>
                <lightning-combobox name="sortField" placeholder="Add column to sort..." options={sortableColumns} class="slds-m-right_x-small sort-combo" onchange={handleAddSort}></lightning-combobox>
                <div class="active-sorts">
                    <template for:each={activeSorts} for:item="sort" for:index="index">
                        <lightning-pill key={sort.fieldName} label={sort.label} name={index} onremove={handleRemoveSort}>
                            <lightning-icon icon-name={sort.icon} size="x-small"></lightning-icon>
                        </lightning-pill>
                    </template>
                </div>
            </div>
        </div>

        <div class="table-container">
            <template if:true={paginatedData}>
                <lightning-datatable
                    key-field="Id"
                    data={paginatedData}
                    columns={columns}
                    onrowselection={handleRowSelection}
                    onrowaction={handleRowAction}
                    resize-column-disabled
                    hide-table-header="false">
                </lightning-datatable>
            </template>
        </div>

        <div class="slds-grid slds-grid_align-spread slds-p-around_medium footer-section">
            <div class="slds-grid slds-grid_vertical-align-center">
                <span class="slds-m-right_small">Rows per page:</span>
                <lightning-combobox variant="label-hidden" value={pageSizeStr} options={pageSizeOptions} onchange={handlePageSizeChange} class="page-size-selector"></lightning-combobox>
            </div>
            
            <div class="slds-grid slds-grid_vertical-align-center">
                <lightning-button-icon icon-name="utility:chevronleft" disabled={isFirstPage} onclick={handlePrevPage} variant="bare"></lightning-button-icon>
                <span class="slds-p-horizontal_medium">Page {currentPage} of {totalPages}</span>
                <lightning-button-icon icon-name="utility:chevronright" disabled={isLastPage} onclick={handleNextPage} variant="bare"></lightning-button-icon>
            </div>
        </div>
    </div>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Transaction Details</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={selectedRecord}>
                        <div class="slds-grid slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>ID:</strong> {selectedRecord.Transaction_ID__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <strong class="slds-m-right_x-small">Status:</strong> 
                                <span class={selectedRecord.statusModalClass}>{selectedRecord.Status__c}</span>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Customer ID:</strong> {selectedRecord.Customer_ID__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Masked Card:</strong> {selectedRecord.Masked_Card_Number__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Amount:</strong> ${selectedRecord.Amount__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Date:</strong> {selectedRecord.Transaction_Date__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Product:</strong> {selectedRecord.Product_Code__c}</div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Store:</strong> {selectedRecord.Store_Location__c}</div>
                        </div>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
