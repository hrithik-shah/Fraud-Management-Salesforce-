<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label">Search Customer ID</label>
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div class={comboboxClass} aria-expanded={isExpanded} aria-haspopup="listbox" role="combobox">
                    
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                        <lightning-input 
                            type="search"
                            variant="label-hidden"
                            value={searchTerm}
                            onchange={handleInputChange}
                            onfocus={handleFocus}
                            onblur={handleBlur}
                            placeholder="Type to search..."
                            autocomplete="off">
                        </lightning-input>
                    </div>

                    <template if:true={showDropdown}>
                        <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                            <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                <template for:each={searchResults} for:item="result">
                                    <li key={result} role="presentation" class="slds-listbox__item" data-id={result} onmousedown={handleSelect}>
                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                            <span class="slds-media__figure slds-listbox__option-icon">
                                                <lightning-icon icon-name="standard:user" size="small"></lightning-icon>
                                            </span>
                                            <span class="slds-media__body">
                                                <span class="slds-truncate" title={result}>{result}</span>
                                            </span>
                                        </div>
                                    </li>
                                </template>
                                <template if:true={noResults}>
                                    <li role="presentation" class="slds-listbox__item">
                                        <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                            <span class="slds-media__body">
                                                <span class="slds-truncate" title="No results found">No results found</span>
                                            </span>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                    
                </div>
            </div>
        </div>
    </div>
</template>
