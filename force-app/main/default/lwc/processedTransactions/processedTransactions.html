<template>
    <lightning-card title="Processed Transactions" icon-name="standard:task2">
        <div class="slds-m-around_medium">
            <div class="table-container">
                <lightning-datatable
                    key-field="Id"
                    data={transactions}
                    columns={columns}
                    onrowaction={handleRowAction} 
                    hide-checkbox-column
                    enable-infinite-loading={enableInfiniteLoading}
                    onloadmore={loadMoreData}>
                </lightning-datatable>
            </div>
        </div>
    </lightning-card>
</template>
