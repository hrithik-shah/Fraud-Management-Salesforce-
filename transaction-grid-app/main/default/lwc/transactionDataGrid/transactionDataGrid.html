<template>
    <div class="dribbble-card slds-is-relative">
        
        <div class="slds-grid slds-grid_align-spread slds-p-around_medium header-section">
            <div class="slds-grid slds-grid_vertical-align-center">
                <h2 class="slds-text-heading_medium slds-text-color_default slds-m-right_medium"><strong>Transactions</strong></h2>
                
                <div class="header-action-group slds-grid slds-grid_vertical-align-center">
                    
                    <div class="slds-is-relative slds-m-right_small">
                        <button class={sortButtonClass} onclick={toggleSortPopup}>
                            <lightning-icon icon-name="utility:sort" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            Sort
                        </button>
                        <template if:true={isSortPopupOpen}>
                            <c-sort-popup 
                                sortable-columns={sortableColumns} 
                                initial-sorts={activeSorts}
                                onclose={toggleSortPopup} 
                                onapply={handleSortApply}>
                            </c-sort-popup>
                        </template>
                    </div>

                    <div class="slds-is-relative">
                        <button class={filterButtonClass} onclick={toggleFilterPopup}>
                            <lightning-icon icon-name="utility:filterList" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            Filters
                        </button>
                        <template if:true={isFilterPopupOpen}>
                            <c-filter-popup 
                                raw-filters={filters}
                                mapped-options={allFilterOptions}
                                onclose={toggleFilterPopup} 
                                onapply={handleFilterApply}>
                            </c-filter-popup>
                        </template>
                    </div>

                </div>
            </div>
            
            <div class="action-buttons">
                <lightning-button label="Approve" variant="success" icon-name="utility:check" class="slds-m-right_x-small" onclick={handleBulkApprove} disabled={isBulkDisabled}></lightning-button>
                <lightning-button label="Cancel" icon-name="utility:close" class="slds-m-right_x-small" onclick={handleBulkCancel} disabled={isBulkDisabled}></lightning-button>
                <lightning-button label="Mark Fraud" variant="destructive" icon-name="utility:warning" onclick={handleBulkFraud} disabled={isBulkDisabled}></lightning-button>
            </div>
        </div>

        <template if:true={hasActiveFiltersOrSorts}>
            <div class="slds-p-horizontal_medium slds-p-top_small slds-p-bottom_x-small active-filters-section slds-border_bottom slds-grid slds-grid_align-spread">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <span class="slds-text-color_weak slds-m-right_small slds-text-title_bold">Active:</span>
                    <div class="filter-tags-container">
                        <template for:each={activeFilterTags} for:item="tag">
                            <lightning-pill key={tag.name} name={tag.name} label={tag.label} onremove={handleRemoveFilter}></lightning-pill>
                        </template>
                        <template for:each={activeSorts} for:item="sort" for:index="index">
                            <lightning-pill key={sort.fieldName} label={sort.label} name={index} onremove={handleRemoveSort} class="sort-pill">
                                <lightning-icon icon-name={sort.icon} size="x-small"></lightning-icon>
                            </lightning-pill>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <div class="table-container">
            <template if:true={paginatedData}>
                <lightning-datatable 
                    key-field="Id" 
                    data={paginatedData} 
                    columns={columns}
                    selected-rows={globalSelectedRows} 
                    onrowselection={handleRowSelection} 
                    onrowaction={handleRowAction} 
                    resize-column-disabled
                    column-widths-mode="auto">
                </lightning-datatable>
            </template>
        </div>

        <div class="slds-grid slds-grid_align-spread slds-p-around_medium footer-section">
            <div class="slds-grid slds-grid_vertical-align-center">
                <span class="slds-m-right_small">Rows per page:</span>
                <lightning-combobox 
                    variant="label-hidden" 
                    value={pageSizeStr} 
                    options={pageSizeOptions} 
                    onchange={handlePageSizeChange} 
                    class="page-size-selector"
                    dropdown-alignment="bottom-left">
                </lightning-combobox>
            </div>
            
            <div class="slds-grid slds-grid_vertical-align-center">
                <lightning-button-icon icon-name="utility:chevronleft" disabled={isFirstPage} onclick={handlePrevPage} variant="bare"></lightning-button-icon>
                <span class="slds-p-horizontal_medium">Page {currentPage} of {totalPages}</span>
                <lightning-button-icon icon-name="utility:chevronright" disabled={isLastPage} onclick={handleNextPage} variant="bare"></lightning-button-icon>
            </div>
        </div>
    </div>

    <template if:true={isModalOpen}>
        <c-detail-modal 
            record={selectedRecord} 
            onclose={closeModal}>
        </c-detail-modal>
    </template>
</template>
