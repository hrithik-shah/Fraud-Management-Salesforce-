<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                </button>
                <h2 class="slds-text-heading_medium slds-hyphenate">Transaction Details</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <template if:true={record}>
                    <div class="slds-grid slds-wrap">
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>ID:</strong> {record.Transaction_ID__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <strong class="slds-m-right_x-small">Status:</strong>
                            <span class={record.statusModalClass}>{record.Status__c}</span>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Customer ID:</strong> {record.Customer_ID__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Masked Card:</strong> {record.Masked_Card_Number__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Amount:</strong> ${record.Amount__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Date:</strong> {record.Transaction_Date__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Product:</strong> {record.Product_Code__c}</div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small"><strong>Store:</strong> {record.Store_Location__c}</div>
                    </div>
                </template>
            </div>
            <footer class="slds-modal__footer">
                <lightning-button label="Close" onclick={handleClose}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
